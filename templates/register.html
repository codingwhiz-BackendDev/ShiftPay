{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ShiftPay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0A6640;
      --accent: #F5A623;
      --background: #F8F9FA;
      --text: #212529;
      --white: #ffffff;
    }
    body {
      background: var(--background);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }
    .navbar-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--primary) !important;
      font-size: 24px;
    }
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--primary);
      font-size: 28px;
      margin-bottom: 10px;
    }
    .auth-header p {
      color: #6c757d;
      font-size: 14px;
    }
    .form-label {
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-control {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(10, 102, 64, 0.1);
    }
    .btn-primary {
      background: var(--primary);
      border: none;
      padding: 12px 24px;
      font-weight: 600;
      border-radius: 8px;
      width: 100%;
    }
    .btn-primary:hover {
      background: #085233;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .messages {
      list-style: none;
      padding: 0;
      margin-bottom: 20px;
    }
    .messages li {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .messages li.error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .messages li.success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white">
  <div class="container">
    <a class="navbar-brand" href="{% url 'index' %}">ShiftPay</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Create your account</h1>
      <p>Your earnings, your advance.</p>
    </div>

    <!-- Django messages -->
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input type="text" name="full_name" class="form-control" placeholder="Tunde Okafor" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone number</label>
        <input type="tel" name="phone_number" class="form-control" placeholder="08012345678" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Job type</label>
        <select name="job_type" class="form-control" required>
          <option value="">Select your job type</option>
          <option value="uber_bolt">Uber/Bolt Driver</option>
          <option value="bus_driver">Bus Driver</option>
          <option value="market_trader">Market Trader</option>
          <option value="artisan">Artisan/Technician</option>
          <option value="delivery_rider">Delivery Rider</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Daily average earnings (₦)</label>
        <input type="number" name="daily_avg_earnings" class="form-control" placeholder="5000" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat your password" required>
      </div>

      <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>

</body>
</html>
